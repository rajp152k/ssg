<!doctype html>
<html lang="{{site_language}}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{document_title}}</title>
    <meta name="description" content="{{document_description}}" />
    <style>
      :root {
        color-scheme: light;
      }

      html,
      body {
        height: 100%;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        font-family: var(--ssg-prose-font, ui-sans-serif, system-ui, sans-serif);
        width: 100%;
        margin: 0;
        padding: 0.35rem 0.4rem;
        line-height: 1.45;
        font-size: 1.14rem;
        overflow: hidden;
        box-sizing: border-box;
      }

      h1,
      h2,
      h3 {
        margin-top: 0;
        margin-bottom: 0.45rem;
        line-height: 1.18;
      }

      p,
      ul,
      ol,
      pre,
      blockquote,
      figure {
        margin-top: 0.45rem;
        margin-bottom: 0.45rem;
      }

      .header {
        flex: 0 0 auto;
        min-height: 0;
      }

      .post-heading {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 0.75rem;
        width: 100%;
        min-width: 0;
      }

      .post-heading h1 {
        min-width: 0;
      }

      .header a {
        color: inherit;
        text-decoration: none;
        font-size: 0.98rem;
        font-style: normal;
        white-space: nowrap;
      }

      .header h1 {
        margin: 0;
        font-size: 1.62rem;
      }

      .meta {
        color: #666;
        margin: 0.04rem 0 0;
        font-size: 0.98rem;
      }

      .post-meta {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        align-items: baseline;
        gap: 0.75rem;
        width: 100%;
      }

      .post-meta span {
        min-width: 0;
        white-space: nowrap;
      }

      .post-meta span:nth-child(1) { text-align: left; }
      .post-meta span:nth-child(2) { text-align: center; }
      .post-meta span:nth-child(3) { text-align: right; }

      main {
        display: flex;
        flex-direction: column;
        min-height: 0;
        height: 100%;
        gap: 0.25rem;
      }

      article {
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        overflow: hidden;
      }

      #ssg-workbench {
        margin-top: 0;
        flex: 1;
        min-height: 0;
        width: 100%;
      }

      .ssg-pane {
        border: 1px solid #e5e7eb;
        border-radius: 0;
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
        background: #fdfdfd;
      }

      .ssg-pane__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.28rem;
        background: #f8fafc;
        border-bottom: 1px solid #e5e7eb;
        padding: 0.22rem 0.42rem;
      }

      .ssg-pane__header h2 {
        margin: 0;
        font-size: 1.06rem;
        line-height: 1.2;
      }

      .ssg-pane__body {
        padding: 0.38rem;
        overflow: auto;
        min-height: 0;
        background: white;
        flex: 1;
        scroll-behavior: smooth;
      }

      .ssg-pane__body pre {
        overflow: auto;
      }

      .ssg-pane__body pre:not(.mermaid) {
        border: 1px solid #d1d5db;
        background: #f8fafc;
        padding: 0.5rem;
        line-height: 1.35;
      }

      .ssg-pane__body code {
        border: 1px solid #e5e7eb;
        background: #f3f4f6;
        padding: 0.05rem 0.18rem;
      }

      .ssg-pane__body pre code {
        border: 0;
        background: transparent;
        padding: 0;
      }

      .ssg-image {
        border: 1px solid #d1d5db;
        background: #f8fafc;
        padding: 0.35rem;
        margin: 0.65rem 0;
      }

      .ssg-image img {
        display: block;
        max-width: 100%;
        margin: 0 auto;
      }

      .ssg-image figcaption {
        border-top: 1px solid #e5e7eb;
        color: #6b7280;
        font-size: 0.98rem;
        margin-top: 0.35rem;
        padding-top: 0.3rem;
        text-align: center;
      }

      [data-pane-id="canvas"] .ssg-pane__header {
        display: none;
      }

      [data-pane-id="canvas"] .ssg-pane__body {
        padding: 0.65rem 0.85rem;
      }

      .canvas-index {
        display: flex;
        flex-direction: column;
        gap: 0.1rem;
        font-size: 0.98rem;
        line-height: 1.25;
      }

      .canvas-index__item {
        color: #374151;
        text-decoration: none;
      }

      .canvas-index__item--depth-2 { padding-left: 0.4rem; }
      .canvas-index__item--depth-3 { padding-left: 0.8rem; }
      .canvas-index__item--depth-4,
      .canvas-index__item--depth-5,
      .canvas-index__item--depth-6 { padding-left: 1.2rem; }

      .canvas-annotation-ref {
        font-size: 0.86em;
        margin-left: 0.12rem;
      }

      .canvas-annotation {
        border-left: 2px solid #e5e7eb;
        padding: 0.25rem 0 0.25rem 0.45rem;
        margin-bottom: 0.35rem;
        color: #4b5563;
        font-size: 0.98rem;
        line-height: 1.32;
      }

      .canvas-annotation.is-active {
        border-left-color: #111827;
        color: #111827;
      }

      .canvas-annotation__label {
        display: inline-block;
        font-weight: 700;
        margin-bottom: 0.2rem;
      }

      .ssg-diagram {
        border: 1px solid #000;
        margin: 0.65rem 0;
        padding: 0.35rem;
      }

      .ssg-diagram figcaption {
        border-top: 1px solid #000;
        color: #666;
        font-size: 0.98rem;
        margin-top: 0.35rem;
        padding-top: 0.3rem;
        text-align: center;
      }

      pre.mermaid {
        background: #fff;
        border: 1px solid #000;
        color: #000;
        font-family: 'Iosevka', ui-monospace, monospace;
        padding: 0.5rem;
        border-radius: 0;
        text-align: center;
      }

      .ssg-diagram pre.mermaid {
        border: 0;
        margin: 0;
      }

      .mermaid svg {
        display: block;
        margin-inline: auto;
        max-width: 100%;
      }

      footer {
        flex: 0 0 auto;
        margin-top: 0;
        padding-top: 0.25rem;
        border-top: 1px solid #e5e7eb;
        color: #6b7280;
        font-size: 0.94rem;
        font-style: normal;
        line-height: 1.25;
        white-space: nowrap;
      }

      @media (max-width: 760px) {
        body {
          overflow: auto;
        }

        main {
          height: auto;
          min-height: 100%;
        }

        .post-heading {
          align-items: flex-start;
        }

        .post-meta {
          grid-template-columns: 1fr;
          gap: 0.1rem;
        }

        .post-meta span,
        .post-meta span:nth-child(1),
        .post-meta span:nth-child(2),
        .post-meta span:nth-child(3) {
          text-align: left;
        }

        article {
          overflow: visible;
        }

        #ssg-workbench {
          display: grid;
          grid-template-columns: 1fr !important;
          grid-template-rows: auto auto !important;
          grid-template-areas:
            "canvas"
            "annotations" !important;
          height: auto;
        }

        [data-pane-id="index"] {
          display: none;
        }

        [data-pane-id="canvas"],
        [data-pane-id="annotations"] {
          min-height: 55vh;
        }

        .ssg-pane__body {
          overflow: visible;
        }

        footer {
          white-space: normal;
        }
      }
    </style>
    {{css_import}}
    {{font_import}}
  </head>
  <body>
    <main>
      <header class="header tex2jax_ignore">
        <div class="post-heading">
          <h1>{{title}}</h1>
          <nav class="site-nav"><a class="site-title" href="../">{{site_title}}</a>{{site_navigation}}</nav>
        </div>
      </header>

      <article>
        {{workbench_html}}
      </article>

      <footer class="tex2jax_ignore">
        {{site_footer}}
      </footer>
    </main>

    {{workbench_script}}
  </body>
</html>
