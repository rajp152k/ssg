<!doctype html>
<html lang="{{site_language}}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{site_title}} | {{page_title}}</title>
    <meta name="description" content="{{site_description}}" />
    <style>
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        max-width: 760px;
        margin: 0 auto;
        padding: 2rem;
        line-height: 1.6;
      }

      ul {
        list-style: none;
        padding: 0;
      }

      li {
        margin-bottom: 0.75rem;
      }

      .site-description {
        color: #4b5563;
      }

      footer {
        margin-top: 3rem;
        padding-top: 1rem;
        border-top: 1px solid #e5e7eb;
        color: #6b7280;
        font-size: 0.9rem;
      }
    </style>
    {{css_import}}
    {{font_import}}
  </head>
  <body>
    <header>
      <h1>{{site_title}}</h1>
      <p class="site-description">{{site_description}}</p>
      <p>{{site_index_description}}</p>
    </header>

    <main>
      {{content}}
    </main>

    <footer>
      {{site_footer}}
    </footer>
  </body>
</html>
