<!doctype html>
<html lang="{{site_language}}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{site_title}} | {{page_title}}</title>
    <meta name="description" content="{{site_description}}" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        max-width: none;
        margin: 0;
        padding: 0.85rem 0.75rem;
        line-height: 1.45;
        font-size: 0.95rem;
      }

      h1 {
        margin: 0 0 0.35rem;
        font-size: 1.65rem;
        line-height: 1.15;
      }

      p {
        margin: 0.35rem 0;
      }

      ul {
        list-style: none;
        padding: 0;
        margin: 0.7rem 0 0;
      }

      li {
        margin-bottom: 0.45rem;
      }

      .site-description {
        color: #4b5563;
      }

      footer {
        margin-top: 1.4rem;
        padding-top: 0.55rem;
        border-top: 1px solid #e5e7eb;
        color: #6b7280;
        font-size: 0.82rem;
        line-height: 1.3;
      }
    </style>
    {{css_import}}
    {{font_import}}
  </head>
  <body>
    <header>
      <h1>{{site_title}}</h1>
      <p class="site-description">{{site_description}}</p>
      <p>{{site_index_description}}</p>
    </header>

    <main>
      {{content}}
    </main>

    <footer>
      {{site_footer}}
    </footer>
  </body>
</html>
