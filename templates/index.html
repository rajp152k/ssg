<!doctype html>
<html lang="{{site_language}}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{site_title}} | {{page_title}}</title>
    <meta name="description" content="{{site_description}}" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        font-family: var(--ssg-prose-font, ui-sans-serif, system-ui, sans-serif);
        width: 100%;
        min-height: 100vh;
        margin: 0;
        padding: 0.85rem 0.75rem;
        font-size: 1.14rem;
        line-height: 1.45;
        display: flex;
        flex-direction: column;
      }

      h1 {
        margin: 0;
        font-size: 2.7rem;
        line-height: 1;
      }

      body > header {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 0.5rem 1rem;
        align-items: start;
      }

      body > header .site-nav {
        grid-column: 2;
        grid-row: 1;
        justify-self: end;
      }

      .site-description {
        grid-column: 1 / -1;
        color: #4b5563;
        margin: 0;
      }

      .posts {
        flex: 1;
        margin-top: 1.5rem;
      }

      .posts h2 {
        border-bottom: 2px solid #000;
        font-size: 0.94rem;
        letter-spacing: 0.04em;
        margin: 0 0 0.75rem;
        padding-bottom: 0.25rem;
        text-transform: uppercase;
      }

      .posts-list {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .posts-list li {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        border-bottom: 1px solid #d1d5db;
        padding: 0.45rem 0;
      }

      .posts-list a {
        color: inherit;
      }

      .posts-list time {
        color: #6b7280;
        flex: none;
      }

      .pagination {
        display: flex;
        justify-content: center;
        gap: 0.4rem;
        margin-top: 1.5rem;
      }

      .pagination a,
      .pagination span {
        border: 1px solid;
        min-width: 2rem;
        padding: 0.2rem 0.45rem;
        text-align: center;
        text-decoration: none;
      }

      .pagination span {
        font-weight: 600;
      }

      footer {
        margin-top: 2rem;
        padding-top: 0.55rem;
        border-top: 1px solid #e5e7eb;
        color: #6b7280;
        font-size: 0.98rem;
        line-height: 1.3;
      }
    </style>
    {{css_import}}
    {{font_import}}
  </head>
  <body>
    <header>
      <h1>{{site_title}}</h1>
      <nav class="site-nav">{{site_navigation}}</nav>
      <p class="site-description">{{site_description}}</p>
    </header>

    <main class="posts" aria-label="posts">
      <h2>{{page_title}}</h2>
      {{content}}
    </main>

    <footer>
      {{site_footer}}
    </footer>
  </body>
</html>
