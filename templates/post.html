<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{title}}</title>
    <meta name="description" content="{{title}}" />
    <style>
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        max-width: 760px;
        margin: 0 auto;
        padding: 2rem;
        line-height: 1.6;
      }

      h1 {
        margin-bottom: 0.25rem;
      }

      .meta {
        color: #666;
        margin-bottom: 1.5rem;
      }

      article {
        max-width: 100%;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>{{title}}</h1>
        <p class="meta">{{date}}</p>
      </header>
      <article>
        {{content}}
      </article>
    </main>
  </body>
</html>
