<!doctype html>
<html lang="{{site_language}}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{document_title}}</title>
    <meta name="description" content="{{document_description}}" />
    <style>
      :root {
        color-scheme: light;
      }

      html,
      body {
        height: 100%;
      }

      body {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        width: min(100%, 1360px);
        margin: 0 auto;
        padding: 0.5rem 0.7rem;
        line-height: 1.6;
        overflow: hidden;
        box-sizing: border-box;
      }

      h1,
      h2,
      h3 {
        margin-top: 0;
      }

      .header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 0.6rem;
      }

      .header a {
        color: inherit;
        text-decoration: none;
      }

      .meta {
        color: #666;
        margin-top: 0.15rem;
      }

      main {
        display: flex;
        flex-direction: column;
        min-height: 0;
        height: 100%;
        gap: 0.35rem;
      }

      article {
        flex: 1;
        min-height: 0;
        display: flex;
      }

      #ssg-workbench {
        margin-top: 0;
        flex: 1;
        min-height: 0;
        width: 100%;
      }

      .ssg-pane {
        border: 1px solid #e5e7eb;
        border-radius: 0;
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
        background: #fdfdfd;
      }

      .ssg-pane__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.4rem;
        background: #f8fafc;
        border-bottom: 1px solid #e5e7eb;
        padding: 0.32rem 0.55rem;
      }

      .ssg-pane__header h2 {
        margin: 0;
        font-size: 0.96rem;
        line-height: 1.2;
      }

      .ssg-pane__body {
        padding: 0.5rem;
        overflow: auto;
        min-height: 0;
        background: white;
        flex: 1;
        scroll-behavior: smooth;
      }

      .ssg-pane__body pre {
        overflow: auto;
      }

      pre.mermaid {
        background: #f8fafc;
        border: 1px dashed #94a3b8;
        padding: 0.75rem;
        border-radius: 0;
      }

      .agent-session {
        margin-bottom: 0.6rem;
        border: 1px solid #e2e8f0;
        border-radius: 0;
        padding: 0.25rem 0.35rem;
        background: #f8fafc;
      }

      .agent-session h4 {
        margin: 0 0 0.5rem;
        font-size: 0.9rem;
      }

      footer {
        margin-top: auto;
        padding-top: 0.55rem;
        border-top: 1px solid #e5e7eb;
        color: #6b7280;
        font-size: 0.9rem;
      }
    </style>
    {{css_import}}
    {{font_import}}
  </head>
  <body>
    <main>
      <header class="header">
        <div>
          <a href="../">{{site_title}}</a>
          <h1>{{title}}</h1>
          <p class="meta">{{date}} • {{site_author}}</p>
        </div>
      </header>

      <article>
        {{workbench_html}}
      </article>

      <footer>
        {{site_footer}}
      </footer>
    </main>

    {{workbench_script}}
  </body>
</html>
