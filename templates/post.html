<!doctype html>
<html lang="{{site_language}}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{document_title}}</title>
    <meta name="description" content="{{document_description}}" />
    <style>
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        max-width: 760px;
        margin: 0 auto;
        padding: 2rem;
        line-height: 1.6;
      }

      h1 {
        margin-bottom: 0.25rem;
      }

      .meta {
        color: #666;
        margin-bottom: 1.5rem;
      }

      article {
        max-width: 100%;
      }

      footer {
        margin-top: 3rem;
        padding-top: 1rem;
        border-top: 1px solid #e5e7eb;
        color: #6b7280;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <p><a href="../">{{site_title}}</a></p>
        <h1>{{title}}</h1>
        <p class="meta">{{date}} • {{site_author}}</p>
      </header>
      <article>
        {{content}}
      </article>
      <footer>
        {{site_footer}}
      </footer>
    </main>
  </body>
</html>
